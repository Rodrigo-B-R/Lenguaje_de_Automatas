<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>RACKET HELLO APP</h1>
    <textarea id="textbox" rows="10" cols="50"></textarea>
    <br>
    <button onclick="run()">RUN</button>

    <iframe id="resultado-frame" style="width:100%; height:300px; border:1px solid #444; margin-top:10px;"></iframe>
    <div id="img-output" style="margin-top:10px;"></div>

</body>
</html>


<script>
    async function run() {
        const text = document.getElementById("textbox").value;

        const response = await fetch("/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ input: text })
        });

        const data = await response.json();

        document.getElementById("resultado-frame").srcdoc = data.resultado;
        document.getElementById("img-output").innerHTML =
            "<img src='data:image/png;base64," + data.imagen + "'>";
    }
</script>
